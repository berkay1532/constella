name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test + coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable + llvm-tools)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Clippy (non-blocking lints)
        run: cargo clippy --workspace --all-targets

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Run tests with coverage
        run: cargo llvm-cov --workspace --lcov --output-path lcov.info

      - name: Coverage summary
        run: cargo llvm-cov report --summary-only

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: lcov.info

  build-wasm:
    name: Build contracts (wasm32v1-none)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust + wasm target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none

      - uses: Swatinem/rust-cache@v2

      - name: Build all contracts to wasm
        run: cargo build --workspace --release --target wasm32v1-none
